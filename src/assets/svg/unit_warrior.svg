<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Guerrero low-poly flat 2D -->
  <!-- Cuerpo -->
  <polygon points="16,4 20,14 16,18 12,14" fill="currentColor"/>
  <!-- Cabeza -->
  <circle cx="16" cy="8" r="3" fill="currentColor"/>
  <!-- Piernas -->
  <polygon points="12,18 10,28 14,28 16,20" fill="currentColor"/>
  <polygon points="20,18 22,28 18,28 16,20" fill="currentColor"/>
  <!-- Lanza -->
  <polygon points="18,6 24,2 23,4 17,8" fill="currentColor"/>
  <line x1="18" y1="6" x2="24" y2="2" stroke="currentColor" stroke-width="1.5"/>
  <!-- Escudo pequeño -->
  <polygon points="10,12 8,18 12,18 12,12" fill="currentColor"/>
</svg>